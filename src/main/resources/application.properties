# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/revora_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=root
# Adjust password to match your local MySQL configuration (empty by default)
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Seeding configuration - run data.sql every time to ensure initial data exists
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Multipart File Upload limits (for saving car images if needed)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Enable console logging details
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.web=INFO
