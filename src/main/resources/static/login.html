<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Login Animation</title>
    <script src="/js/toast-modal.js"></script>
</head>
<body>
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:url("show.png") center center/cover no-repeat;
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.35);
}

.container{
    position:relative;
    width:100%;
    height:100vh;
    z-index:1;
}

.dashboard{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    color:white;
    transition:0.8s;
}

.dashboard h1{
    font-size:55px;
    margin-bottom:10px;
}

.dashboard p{
    margin-bottom:25px;
    font-size:18px;
}

.hide-dashboard{
    opacity:0;
    transform:translate(-50%,-50%) scale(0.8);
}

#loginBtn{
    padding:14px 40px;
    border:none;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
}

.car{
    position:absolute;
    bottom:60px;
    right:120px;
    width:500px;
    filter:drop-shadow(0 15px 20px rgba(0,0,0,0.5));
}

.drive{
    animation:carDrive 2.5s ease-in-out forwards;
}

@keyframes carDrive{
    0%{
        transform:translateX(0) scale(1);
    }

    40%{
        transform:translateX(-300px) scale(1.03);
    }

    100%{
        transform:translateX(-1800px) scale(1.1);
    }
}

.login-form{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:380px;

    padding:30px;

    border-radius:20px;
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,0.12);

    border:1px solid rgba(255,255,255,0.2);

    opacity:0;
    visibility:hidden;

    color:white;
}

.show-form{
    animation:formShow 1s ease forwards;
    visibility:visible;
}

@keyframes formShow{
    from{
        opacity:0;
        transform:translate(-50%,-40%);
    }

    to{
        opacity:1;
        transform:translate(-50%,-50%);
    }
}

.login-form h2{
    text-align:center;
    margin-bottom:20px;
}

.login-form input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
}

.login-form button{
    width:50%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    background-color: rgb(176, 31, 31);
    margin-left: 75px;
}

    </style>

<div class="overlay"></div>

<div class="container">

    <div class="dashboard" id="dashboard">
        <h1>Drive Your Dream</h1>
        <p>Premium Car Showroom</p>
        <button id="loginBtn">Login</button>
    </div>

    <img src="show1car.png" alt="Car" class="car" id="car">

    <div class="login-form" id="loginForm">
        <h2>Login</h2>

        <input type="text" id="usernameInput" placeholder="Username">

        <input type="password" id="passwordInput" placeholder="Password">

        <button id="sig" onclick="submitLogin()">Sign In</button>
        <p style="margin-top: 15px; text-align: center; font-size: 14px; color: #fff;">Don't have an account? <a href="register.html" style="color: #B01F1F; text-decoration: none; font-weight: bold;">Register here</a></p>
        <p style="margin-top: 10px; text-align: center; font-size: 14px;"><a href="home.html" style="color: #ccc; text-decoration: none;">← Back to Home</a></p>
    </div>

</div>

<script src="script.js"></script>
</body>
<script>
    const loginBtn = document.getElementById("loginBtn");
const car = document.getElementById("car");
const dashboard = document.getElementById("dashboard");
const loginForm = document.getElementById("loginForm");

loginBtn.addEventListener("click", () => {

    dashboard.classList.add("hide-dashboard");

    setTimeout(() => {
        car.classList.add("drive");
    }, 400);

    car.addEventListener("animationend", () => {
        loginForm.classList.add("show-form");
    }, { once: true });

});

function submitLogin() {
    const username = document.getElementById("usernameInput").value.trim();
    const password = document.getElementById("passwordInput").value.trim();

    if (!username || !password) {
        alert("Please enter both username and password");
        return;
    }

    fetch("/api/users/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    })
    .then(response => {
        if (!response.ok) {
            throw new Error("Invalid username or password");
        }
        return response.json();
    })
    .then(user => {
        localStorage.setItem("currentUser", JSON.stringify(user));
        alert("Login successful!");
        window.location.href = "home.html";
    })
    .catch(error => {
        alert(error.message);
    });
}
</script>
</html>
