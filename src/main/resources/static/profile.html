
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REVORA - My Profile</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="/js/toast-modal.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f5f7fb;
}

/* HEADER */
.header{
    height:70px;
    background:#02142b;
    color:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 30px;
}

.logo{
    font-size:28px;
    font-weight:bold;
    cursor:pointer;
}

.icons i{
    margin-left:20px;
    cursor:pointer;
    font-size:18px;
}

/* MAIN LAYOUT */
.container{
    display:flex;
    min-height:calc(100vh - 70px);
}

/* SIDEBAR */
.sidebar{
    width:250px;
    background:white;
    border-right:1px solid #ddd;
    padding-top:30px;
}

.sidebar ul{
    list-style:none;
}

.sidebar ul li{
    padding:15px 25px;
    margin:8px 15px;
    border-radius:10px;
    cursor:pointer;
    transition:all .3s ease;
}

.sidebar ul li i{
    margin-right:10px;
}

.sidebar ul li:hover{
    background:#edf3ff;
    transform:translateX(5px);
}

.active{
    background:#dce8ff;
    color:#0057ff;
    font-weight:600;
}

/* CONTENT */
.main{
    flex:1;
    padding:35px;
}

.main h2{
    margin-bottom:25px;
}

/* PROFILE CARD */
.profile-card{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
    display:flex;
    align-items:center;
    gap:30px;
    margin-bottom:25px;
}

.profile-img{
    width:120px;
    height:120px;
    border-radius:50%;
    background:#0057ff;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:45px;
}

.profile-info h3{
    margin-bottom:10px;
}

.profile-info p{
    color:#666;
    margin-bottom:5px;
}

/* FORM */
.form-box{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.form-group{
    margin-bottom:20px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

.form-group input{
    width:100%;
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    outline:none;
}

.save-btn{
    background:#0057ff;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

.save-btn:hover{
    background:#0046cc;
}

/* MOBILE */
@media(max-width:768px){

.container{
    flex-direction:column;
}

.sidebar{
    width:100%;
}

.profile-card{
    flex-direction:column;
    text-align:center;
}

}

</style>
</head>
<body>

<!-- HEADER -->
<div class="header">

    <div class="logo"
         onclick="window.location.href='dashboard.html'">
         REVORA
    </div>

    <div class="icons">
        <i class="fas fa-bell"></i>
        <i class="fas fa-cog"></i>
        <i class="fas fa-user-circle"></i>
    </div>

</div>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <ul>

            <li class="active"
                onclick="window.location.href='profile.html'">
                <i class="fas fa-user"></i> Profile
            </li>

            <li onclick="window.location.href='book.html'">
                <i class="fas fa-calendar-check"></i> My Bookings
            </li>

            <li onclick="window.location.href='favorites.html'">
                <i class="fas fa-heart"></i> My Favorites
            </li>

            <li onclick="window.location.href='inquiries.html'">
                <i class="fas fa-envelope"></i> My Inquiries
            </li>

            <li onclick="window.location.href='dashboard.html'">
                <i class="fas fa-home"></i> Dashboard
            </li>

            <li onclick="window.location.href='home.html'">
                <i class="fas fa-car-side"></i> View Showroom
            </li>

            <li onclick="logout()">
             <i class="fas fa-sign-out-alt"></i> Logout
            </li>

        </ul>

    </div>

    <!-- MAIN CONTENT -->
    <div class="main">

        <h2>My Profile</h2>

        <div class="profile-card">

            <div class="profile-img">
                <i class="fas fa-user"></i>
            </div>

            <div class="profile-info">
                <h3>Siva</h3>
                <p>Email: siva@gmail.com</p>
                <p>Phone: +91 9876543210</p>
                <p>Member Since: 2026</p>
            </div>

        </div>

        <div class="form-box">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="profileName" value="">
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="profileEmail" value="">
            </div>

            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" id="profilePhone" value="">
            </div>

            <div class="form-group">
                <label>Address</label>
                <input type="text" id="profileAddress" placeholder="Enter your address" value="">
            </div>

            <button class="save-btn" onclick="saveProfileChanges()">
                Save Changes
            </button>

        </div>

    </div>

</div>

</body>
<script>
// Check local storage for session authentication
const currentUser = JSON.parse(localStorage.getItem("currentUser"));
if (!currentUser) {
    window.location.href = "login.html";
} else {
    // Populate card and inputs
    document.querySelector(".profile-info h3").innerText = currentUser.username;
    document.querySelector(".profile-info p:nth-child(2)").innerText = "Email: " + (currentUser.email || "");
    document.querySelector(".profile-info p:nth-child(3)").innerText = "Phone: " + (currentUser.phone || "");
    
    document.getElementById("profileName").value = currentUser.username;
    document.getElementById("profileEmail").value = currentUser.email || "";
    document.getElementById("profilePhone").value = currentUser.phone || "";
    document.getElementById("profileAddress").value = currentUser.address || "";
}

function saveProfileChanges() {
    const updatedUser = {
        username: document.getElementById("profileName").value.trim(),
        email: document.getElementById("profileEmail").value.trim(),
        phone: document.getElementById("profilePhone").value.trim(),
        address: document.getElementById("profileAddress").value.trim()
    };

    fetch(`/api/users/${currentUser.id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(updatedUser)
    })
    .then(res => {
        if (!res.ok) {
            throw new Error("Failed to update profile");
        }
        return res.json();
    })
    .then(user => {
        localStorage.setItem("currentUser", JSON.stringify(user));
        alert("Profile updated successfully!");
        window.location.reload();
    })
    .catch(err => {
        alert(err.message);
    });
}

function logout() {
    let confirmLogout = confirm("Are you sure you want to logout?");
    if (confirmLogout) {
        localStorage.removeItem("currentUser");
        window.location.href = "login.html";
    }
}
</script>
</html>
