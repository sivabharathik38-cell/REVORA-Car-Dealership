
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REVORA - My Favorites</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="/js/toast-modal.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f5f7fb;
}

.header{
    height:70px;
    background:#02142b;
    color:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 30px;
}

.logo{
    font-size:28px;
    font-weight:bold;
    cursor:pointer;
}

.icons i{
    margin-left:20px;
    cursor:pointer;
}

.container{
    display:flex;
    min-height:calc(100vh - 70px);
}

.sidebar{
    width:250px;
    background:white;
    border-right:1px solid #ddd;
    padding-top:30px;
}

.sidebar ul{
    list-style:none;
}

.sidebar ul li{
    padding:15px 25px;
    margin:8px 15px;
    border-radius:10px;
    cursor:pointer;
    transition:.3s;
}

.sidebar ul li:hover{
    background:#edf3ff;
    transform:translateX(5px);
}

.sidebar ul li i{
    margin-right:10px;
}

.active{
    background:#dce8ff;
    color:#0057ff;
    font-weight:600;
}

.main{
    flex:1;
    padding:35px;
}

.main h2{
    margin-bottom:25px;
}

.favorites-card{
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    text-align:left;
    padding:15px;
    background:#f8f8f8;
}

td{
    padding:18px 15px;
    border-bottom:1px solid #eee;
}

.btn{
    border:none;
    padding:8px 15px;
    border-radius:6px;
    color:white;
    cursor:pointer;
    margin-right:5px;
}

.view{
    background:#0057ff;
}

.remove{
    background:#ff3b30;
}

@media(max-width:768px){

.container{
    flex-direction:column;
}

.sidebar{
    width:100%;
}

table{
    font-size:14px;
}

}

</style>
</head>
<body>

<div class="header">

    <div class="logo" onclick="window.location.href='dashboard.html'">
        REVORA
    </div>

    <div class="icons">
        <i class="fas fa-bell"></i>
        <i class="fas fa-cog"></i>
        <i class="fas fa-user-circle"></i>
    </div>

</div>

<div class="container">

    <div class="sidebar">

        <ul>

            <li onclick="window.location.href='profile.html'">
                <i class="fas fa-user"></i> Profile
            </li>

            <li onclick="window.location.href='book.html'">
                <i class="fas fa-calendar-check"></i> My Bookings
            </li>

            <li class="active" onclick="window.location.href='favorites.html'">
                <i class="fas fa-heart"></i> My Favorites
            </li>

            <li onclick="window.location.href='inquiries.html'">
                <i class="fas fa-envelope"></i> My Inquiries
            </li>

            <li onclick="window.location.href='dashboard.html'">
                <i class="fas fa-home"></i> Dashboard
            </li>

            <li onclick="window.location.href='home.html'">
                <i class="fas fa-car-side"></i> View Showroom
            </li>

            <li onclick="logout()">
             <i class="fas fa-sign-out-alt"></i> Logout
            </li>

        </ul>

    </div>

    <div class="main">

        <h2>My Favorites</h2>

        <div class="favorites-card">

            <table>

                <thead>
                    <tr>
                        <th>Car Name</th>
                        <th>Brand</th>
                        <th>Price</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="favoritesTableBody">
                    <!-- Loaded dynamically -->
                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
<script>
// Check local storage for session authentication
const currentUser = JSON.parse(localStorage.getItem("currentUser"));
if (!currentUser) {
    window.location.href = "login.html";
} else {
    loadUserFavorites();
}

function loadUserFavorites() {
    fetch(`/api/favorites?userId=${currentUser.id}`)
        .then(res => res.json())
        .then(favs => {
            const tbody = document.getElementById("favoritesTableBody");
            tbody.innerHTML = "";

            if (favs.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#888;">You have no favorite cars saved.</td></tr>`;
                return;
            }

            favs.forEach(f => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${f.car.name}</td>
                    <td>${f.car.brand}</td>
                    <td>${f.car.priceText}</td>
                    <td>
                        <button class="btn view" onclick="viewCarDetail(${f.car.id})">View</button>
                        <button class="btn remove" onclick="removeFavorite(${f.id})">Remove</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        })
        .catch(err => console.error("Error fetching favorites:", err));
}

function viewCarDetail(carId) {
    window.location.href = `cars.html`; // Redirect to car list or you can query specific car search
}

function removeFavorite(id) {
    if (confirm("Are you sure you want to remove this car from favorites?")) {
        fetch(`/api/favorites/${id}`, {
            method: "DELETE"
        })
        .then(res => {
            if (res.ok) {
                alert("Removed from favorites.");
                loadUserFavorites();
            } else {
                alert("Error removing favorite.");
            }
        });
    }
}

function logout() {
    let confirmLogout = confirm("Are you sure you want to logout?");
    if (confirmLogout) {
        localStorage.removeItem("currentUser");
        window.location.href = "login.html";
    }
}
</script>
</html>
