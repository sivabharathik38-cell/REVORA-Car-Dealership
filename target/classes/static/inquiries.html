
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REVORA - My Inquiries</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="/js/toast-modal.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f5f7fb;
}

.header{
    height:70px;
    background:#02142b;
    color:white;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 30px;
}

.logo{
    font-size:28px;
    font-weight:bold;
    cursor:pointer;
}

.icons i{
    margin-left:20px;
    cursor:pointer;
}

.container{
    display:flex;
    min-height:calc(100vh - 70px);
}

.sidebar{
    width:250px;
    background:white;
    border-right:1px solid #ddd;
    padding-top:30px;
}

.sidebar ul{
    list-style:none;
}

.sidebar ul li{
    padding:15px 25px;
    margin:8px 15px;
    border-radius:10px;
    cursor:pointer;
    transition:.3s;
}

.sidebar ul li:hover{
    background:#edf3ff;
    transform:translateX(5px);
}

.sidebar ul li i{
    margin-right:10px;
}

.active{
    background:#dce8ff;
    color:#0057ff;
    font-weight:600;
}

.main{
    flex:1;
    padding:35px;
}

.main h2{
    margin-bottom:25px;
}

.inquiry-card{
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    text-align:left;
    padding:15px;
    background:#f8f8f8;
}

td{
    padding:18px 15px;
    border-bottom:1px solid #eee;
}

.status{
    padding:8px 15px;
    border-radius:20px;
    font-size:13px;
    font-weight:600;
}

.pending{
    background:#fff4d6;
    color:#d49b00;
}

.replied{
    background:#dff8e5;
    color:#1e9f4d;
}

.btn{
    border:none;
    padding:8px 15px;
    border-radius:6px;
    color:white;
    cursor:pointer;
}

.view{
    background:#0057ff;
}

@media(max-width:768px){

.container{
    flex-direction:column;
}

.sidebar{
    width:100%;
}

table{
    font-size:14px;
}

}

</style>
</head>
<body>

<div class="header">

    <div class="logo" onclick="window.location.href='dashboard.html'">
        REVORA
    </div>

    <div class="icons">
        <i class="fas fa-bell"></i>
        <i class="fas fa-cog"></i>
        <i class="fas fa-user-circle"></i>
    </div>

</div>

<div class="container">

    <div class="sidebar">

        <ul>

            <li onclick="window.location.href='profile.html'">
                <i class="fas fa-user"></i> Profile
            </li>

            <li onclick="window.location.href='book.html'">
                <i class="fas fa-calendar-check"></i> My Bookings
            </li>

            <li onclick="window.location.href='favorites.html'">
                <i class="fas fa-heart"></i> My Favorites
            </li>

            <li class="active" onclick="window.location.href='inquiries.html'">
                <i class="fas fa-envelope"></i> My Inquiries
            </li>

            <li onclick="window.location.href='dashboard.html'">
                <i class="fas fa-home"></i> Dashboard
            </li>

            <li onclick="window.location.href='home.html'">
                <i class="fas fa-car-side"></i> View Showroom
            </li>

            <li onclick="logout()">
             <i class="fas fa-sign-out-alt"></i> Logout
            </li>

        </ul>

    </div>

    <div class="main">

        <h2>My Inquiries</h2>

        <div class="inquiry-card">

            <table>

                <thead>
                    <tr>
                        <th>Car</th>
                        <th>Inquiry Date</th>
                        <th>Status</th>
                        <th>Reply</th>
                    </tr>
                </thead>

                <tbody id="inquiriesTableBody">
                    <!-- Loaded dynamically -->
                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
<script>
// Check local storage for session authentication
const currentUser = JSON.parse(localStorage.getItem("currentUser"));
if (!currentUser) {
    window.location.href = "login.html";
} else {
    loadUserInquiries();
}

function loadUserInquiries() {
    fetch(`/api/inquiries?userId=${currentUser.id}`)
        .then(res => res.json())
        .then(inquiries => {
            const tbody = document.getElementById("inquiriesTableBody");
            tbody.innerHTML = "";

            if (inquiries.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; color:#888;">You have no active inquiries.</td></tr>`;
                return;
            }

            inquiries.forEach(inq => {
                const tr = document.createElement("tr");
                
                let statusClass = "pending";
                if (inq.status === "Replied") statusClass = "replied";

                const carName = inq.car ? inq.car.name : "General Inquiry";
                const actionButton = inq.status === "Replied" 
                    ? `<button class="btn view" onclick="alert('Admin Reply:\\n\\n${inq.reply}')">View Reply</button>`
                    : `<button class="btn view" onclick="alert('Inquiry Message:\\n\\n${inq.message}\\n\\nStatus: Awaiting reply.')">View</button>`;

                tr.innerHTML = `
                    <td>${carName}</td>
                    <td>${inq.inquiryDate}</td>
                    <td><span class="status ${statusClass}">${inq.status}</span></td>
                    <td>${actionButton}</td>
                `;
                tbody.appendChild(tr);
            });
        })
        .catch(err => console.error("Error fetching inquiries:", err));
}

function logout() {
    let confirmLogout = confirm("Are you sure you want to logout?");
    if (confirmLogout) {
        localStorage.removeItem("currentUser");
        window.location.href = "login.html";
    }
}
</script>
</html>
